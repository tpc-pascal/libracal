name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and extract assets from latest Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          if [ -n "$TAG" ]; then
            echo "Latest release found: $TAG. Downloading assets..."
            gh release download "$TAG" --clobber
            
            # Kiểm tra xem tệp materials.zip có tồn tại hay không
            if [ -f "materials.zip" ]; then
              unzip -o "materials.zip"
              echo "Extracted assets from materials.zip in release: $TAG"
            else
              echo "Warning: 'materials.zip' not found in this release. Skipping extraction."
            fi
          else
            echo "No release found, skipping asset download"
          fi

      - name: Sync and Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          TEMP_DIR="../hf_sync_internal"
          rm -rf $TEMP_DIR
          mkdir -p $TEMP_DIR

          if [ -d "hf" ]; then
            echo "Copying contents from hf folder..."
            cp -r hf/. $TEMP_DIR/
          fi

          if [ -d "books" ]; then
            echo "Copying books folder..."
            cp -r books $TEMP_DIR/
          fi

          if [ -d "images" ]; then
            echo "Copying images folder..."
            cp -r images $TEMP_DIR/
          fi

          cd $TEMP_DIR

          if [ ! -f ".gitattributes" ]; then
            echo "*.pdf filter=lfs diff=lfs merge=lfs -text" > .gitattributes
            echo "*.png filter=lfs diff=lfs merge=lfs -text" >> .gitattributes
            echo "*.jpg filter=lfs diff=lfs merge=lfs -text" >> .gitattributes
          fi

          git config --global init.defaultBranch main
          git init
          git lfs install
          git config user.name "tpc-pascal"
          git config user.email "tpcmemory2005@gmail.com"

          git add .
          git commit -m "ci: sync hf, books, and images to space"

          git push --force https://tpc-pascal:$HF_TOKEN@huggingface.co/spaces/tpc-pascal/libracal main