<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="shelf" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="50%" stop-color="#A0784C"/>
      <stop offset="100%" stop-color="#8B5E3C"/>
    </linearGradient>
    <linearGradient id="book1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <linearGradient id="book2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#2980B9"/>
    </linearGradient>
    <linearGradient id="book3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <linearGradient id="book4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F39C12"/>
      <stop offset="100%" stop-color="#E67E22"/>
    </linearGradient>
    <linearGradient id="book5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#8E44AD"/>
    </linearGradient>
  </defs>

  <!-- Bookshelf -->
  <!-- Shelf top -->
  <rect x="20" y="45" width="110" height="8" rx="2" fill="url(#shelf)"/>
  <!-- Shelf bottom -->
  <rect x="20" y="85" width="110" height="8" rx="2" fill="url(#shelf)"/>
  <!-- Left side -->
  <rect x="20" y="25" width="8" height="68" rx="2" fill="url(#shelf)"/>
  <!-- Right side -->
  <rect x="122" y="25" width="8" height="68" rx="2" fill="url(#shelf)"/>

  <!-- Books row 1 -->
  <rect x="32" y="28" width="14" height="33" rx="2" fill="url(#book1)"/>
  <rect x="48" y="31" width="10" height="30" rx="2" fill="url(#book2)"/>
  <rect x="60" y="27" width="16" height="34" rx="2" fill="url(#book3)"/>
  <rect x="78" y="30" width="12" height="31" rx="2" fill="url(#book4)"/>
  <rect x="92" y="28" width="15" height="33" rx="2" fill="url(#book5)"/>
  <rect x="110" y="29" width="10" height="32" rx="2" fill="url(#book1)"/>

  <!-- Books row 2 -->
  <rect x="32" y="56" width="12" height="26" rx="2" fill="url(#book4)"/>
  <rect x="46" y="60" width="16" height="22" rx="2" fill="url(#book5)"/>
  <rect x="64" y="58" width="14" height="24" rx="2" fill="url(#book2)"/>
  <rect x="80" y="56" width="10" height="26" rx="2" fill="url(#book1)"/>
  <rect x="92" y="61" width="18" height="21" rx="2" fill="url(#book3)"/>
  <rect x="114" y="57" width="8" height="25" rx="2" fill="url(#book4)"/>

  <!-- Book spine lines -->
  <line x1="39" y1="33" x2="39" y2="56" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <line x1="53" y1="36" x2="53" y2="56" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <line x1="68" y1="32" x2="68" y2="56" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <line x1="84" y1="35" x2="84" y2="56" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <line x1="99" y1="33" x2="99" y2="56" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <line x1="115" y1="34" x2="115" y2="56" stroke="#fff" stroke-width="1" opacity="0.3"/>

  <!-- Text -->
  <text x="160" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#5D4037">libra</text>
  <text x="256" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="300" fill="#8B5E3C">cal</text>
  <text x="160" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#8B5E3C" letter-spacing="3">DIGITAL BOOKSHELF</text>
</svg>
